# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: q2-boots-docs
  title: q2-boots Documentation
  # description:
  keywords: ["QIIME", "QIIME 2", "microbiome", "metagenome"]
  # uncommenting "authors" will put the author list on every page
  # authors: ["Caporaso Lab"]
  # github:
  references:
    rachis-news-target: https://news.rachis.org/en/latest/

  toc:
    - file: intro.md
    - file: tutorial.md
    - title: Plugin Reference
      children:
        - pattern: plugin-reference/plugins/boots.md
        - title: Artifact Classes and Formats
          children:
            - pattern: plugin-reference/artifacts/classes.md
            - pattern: plugin-reference/artifacts/formats.md

  downloads:
    - file: _static/environment.yml
      title: Conda environment file

site:
  template: book-theme
  options:
      folders: true
      favicon: _static/favicon.ico
      logo: _static/logo-light.png
      logo_dark: _static/logo-dark.png
      pretty_urls: false
